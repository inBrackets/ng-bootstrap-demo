<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">ng-bootstrap</span>
      <small class="text-muted">Component Demo</small>
    </div>
    <nav class="sidebar-nav">
      @for (cat of categories; track cat.name) {
        <div class="nav-category">
          <span class="nav-category-label">{{ cat.name }}</span>
          <ul class="nav flex-column">
            @for (item of cat.items; track item.route) {
              <li class="nav-item">
                <a class="nav-link"
                   [routerLink]="item.route"
                   routerLinkActive="active">
                  {{ item.label }}
                </a>
              </li>
            }
          </ul>
        </div>
      }
    </nav>
  </aside>
  <main class="main-content">
    <router-outlet />
  </main>
</div>
