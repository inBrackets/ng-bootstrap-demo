<h2 class="demo-title">Dropdown</h2>
<p class="text-muted mb-4">Toggleable contextual overlays for displaying lists of links.</p>

<h5>Basic Dropdown</h5>
<div class="mb-4 d-flex gap-3 flex-wrap">
  <div ngbDropdown class="d-inline-block">
    <button type="button" class="btn btn-primary" ngbDropdownToggle>Actions</button>
    <div ngbDropdownMenu>
      <button ngbDropdownItem>Action 1</button>
      <button ngbDropdownItem>Action 2</button>
      <button ngbDropdownItem>Action 3</button>
      <div class="dropdown-divider"></div>
      <button ngbDropdownItem>Separated action</button>
    </div>
  </div>

  <div ngbDropdown class="d-inline-block">
    <button type="button" class="btn btn-outline-secondary" ngbDropdownToggle>Outline</button>
    <div ngbDropdownMenu>
      <h6 class="dropdown-header">Dropdown header</h6>
      <button ngbDropdownItem>Option A</button>
      <button ngbDropdownItem>Option B</button>
      <button ngbDropdownItem disabled>Disabled option</button>
    </div>
  </div>
</div>

<h5>Placement variants</h5>
<div class="mb-4 d-flex gap-3 flex-wrap">
  <div ngbDropdown placement="bottom-start" class="d-inline-block">
    <button type="button" class="btn btn-sm btn-outline-primary" ngbDropdownToggle>bottom-start</button>
    <div ngbDropdownMenu><button ngbDropdownItem>Item 1</button><button ngbDropdownItem>Item 2</button></div>
  </div>
  <div ngbDropdown placement="bottom-end" class="d-inline-block">
    <button type="button" class="btn btn-sm btn-outline-primary" ngbDropdownToggle>bottom-end</button>
    <div ngbDropdownMenu><button ngbDropdownItem>Item 1</button><button ngbDropdownItem>Item 2</button></div>
  </div>
  <div ngbDropdown placement="top-start" class="d-inline-block">
    <button type="button" class="btn btn-sm btn-outline-primary" ngbDropdownToggle>top-start</button>
    <div ngbDropdownMenu><button ngbDropdownItem>Item 1</button><button ngbDropdownItem>Item 2</button></div>
  </div>
  <div ngbDropdown placement="top-end" class="d-inline-block">
    <button type="button" class="btn btn-sm btn-outline-primary" ngbDropdownToggle>top-end</button>
    <div ngbDropdownMenu><button ngbDropdownItem>Item 1</button><button ngbDropdownItem>Item 2</button></div>
  </div>
</div>

<h5>Split button</h5>
<div class="mb-4">
  <div class="btn-group">
    <button type="button" class="btn btn-danger">Action</button>
    <div ngbDropdown class="btn-group" role="group">
      <button type="button" class="btn btn-danger dropdown-toggle-split" ngbDropdownToggle></button>
      <div ngbDropdownMenu>
        <button ngbDropdownItem>Option 1</button>
        <button ngbDropdownItem>Option 2</button>
        <button ngbDropdownItem>Option 3</button>
      </div>
    </div>
  </div>
</div>
